<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sinergia FP | Procedimiento</title>
  <script>(function(){if(localStorage.getItem('sfp-theme')==='light')document.documentElement.classList.add('light')})();</script>
  <link rel="stylesheet" href="./css/styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Sinergia FP · Procedimiento</h1>
      <p id="currentUser" class="current-user"></p>
    </div>
    <div class="topbar-actions">
      <a href="./app.html" class="secondary-btn topbar-link">← Volver</a>
      <button id="editProcedureBtn" class="edit-btn" type="button">Editar</button>
      <button id="deleteProcedureBtn" class="danger-btn" type="button">Eliminar</button>
      <button id="themeBtn" class="theme-btn" type="button"></button>
      <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
    </div>
  </header>

  <main class="procedure-page">
    <section id="procedureFullView" class="procedure-full-view">
      <p>Cargando procedimiento…</p>
    </section>

    <section id="procedureEditPanel" class="procedure-edit-panel" hidden>
      <div class="panel">
        <h2>Editar procedimiento</h2>
        <form id="editProcedureForm" class="procedure-form">
          <label for="editTitle">Título</label>
          <input type="text" id="editTitle" required />

          <label for="editCategory">Categoría</label>
          <input type="text" id="editCategory" />

          <label for="editDescription">Descripción</label>
          <textarea id="editDescription" rows="3" required></textarea>

          <label>Pasos</label>
          <div id="editStepsEditor"></div>
          <p class="editor-help">Puedes escribir, pegar texto con formato y pegar imágenes directamente.</p>

          <label for="editDocumentUrl">URL del documento externo</label>
          <input type="text" id="editDocumentUrl" />

          <div class="form-actions">
            <button id="saveEditBtn" type="submit" class="primary-btn">Guardar cambios</button>
            <button id="cancelEditBtn" type="button" class="secondary-btn">Cancelar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <script type="module" src="./js/procedure-detail.js"></script>
</body>
</html>
