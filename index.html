<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sinergia FP | Acceso IT</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="login-body">
  <main class="login-container login-container--centered">
    <section class="login-card login-card--narrow">
      <div class="login-logo">
        <h1>Sinergia FP</h1>
        <p class="subtitle">Portal de procedimientos IT</p>
      </div>

      <div id="loginMessage" class="message"></div>

      <form id="loginForm" class="login-form">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com" required />

        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />

        <button type="submit" class="primary-btn login-submit-btn">Entrar</button>
      </form>
    </section>
  </main>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
