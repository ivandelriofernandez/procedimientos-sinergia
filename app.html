<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sinergia FP | Panel IT</title>
  <script>(function(){if(localStorage.getItem('sfp-theme')==='light')document.documentElement.classList.add('light')})();</script>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <header class="topbar">
    <div>
      <h1>Sinergia FP · Procedimientos IT</h1>
      <p id="currentUser" class="current-user"></p>
    </div>
    <div class="topbar-actions">
      <a href="./nuevo-procedimiento.html" class="primary-btn topbar-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo procedimiento
      </a>
      <button id="themeBtn" class="theme-btn" type="button"></button>
      <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
    </div>
  </header>

  <div class="app-layout">
    <aside class="app-sidebar">
      <div class="sidebar-search-wrap">
        <svg class="sidebar-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" class="sidebar-search" placeholder="Buscar procedimiento…" autocomplete="off" />
        <button id="clearSearch" class="sidebar-search-clear" hidden aria-label="Limpiar búsqueda">✕</button>
      </div>
      <div class="sidebar-stats">
        <span id="statTotal" class="stat-chip">— procedimientos</span>
      </div>
      <nav class="sidebar-nav" id="categoryNav">
        <p class="sidebar-nav-label">Categorías</p>
      </nav>
    </aside>

    <main class="app-main">
      <div id="proceduresList" class="proc-grid">
        <p class="list-placeholder">Cargando procedimientos…</p>
      </div>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
