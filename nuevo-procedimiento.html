<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sinergia FP | Nuevo procedimiento</title>
  <link rel="icon" href="./assets/favicon-sinergia.webp" type="image/webp" />
  <script>(function(){if(localStorage.getItem('sfp-theme')==='light')document.documentElement.classList.add('light')})();</script>
  <link rel="stylesheet" href="./css/styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet" />
</head>
<body class="word-body">

  <header class="word-topbar">
    <div class="word-topbar-left">
      <a href="./app.html" class="word-back-btn">← Volver</a>
      <span class="word-app-name">Sinergia FP</span>
    </div>
    <div class="word-topbar-center">
      <span id="docNameDisplay" class="word-doc-name">Nuevo procedimiento</span>
    </div>
    <div class="word-topbar-right">
      <p id="currentUser" class="word-current-user"></p>
      <button id="saveProcedureBtn" type="button" class="word-save-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Guardar
      </button>
      <button id="themeBtn" class="word-theme-btn" type="button"></button>
      <button id="logoutBtn" class="word-logout-btn" type="button">Salir</button>
    </div>
  </header>

  <div class="word-ribbon-wrap">
    <div id="quillToolbar" class="word-ribbon">
      <span class="ql-formats">
        <select class="ql-header">
          <option value="1">Título 1</option>
          <option value="2">Título 2</option>
          <option value="3">Título 3</option>
          <option selected>Normal</option>
        </select>
      </span>
      <span class="ql-formats">
        <button class="ql-bold"></button>
        <button class="ql-italic"></button>
        <button class="ql-underline"></button>
        <button class="ql-strike"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-list" value="ordered"></button>
        <button class="ql-list" value="bullet"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-blockquote"></button>
        <button class="ql-code-block"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-link"></button>
        <button class="ql-image"></button>
      </span>
      <span class="ql-formats">
        <select class="ql-color"></select>
        <select class="ql-background"></select>
      </span>
      <span class="ql-formats">
        <button class="ql-clean"></button>
      </span>
    </div>
  </div>

  <main class="word-canvas">
    <div id="saveMessage" class="word-save-message" hidden></div>

    <div class="word-page">

      <!-- Metadatos -->
      <div class="word-page-meta">
        <input type="text" id="title" class="word-title-input"
               placeholder="Título del procedimiento" maxlength="120" />

        <div class="word-meta-row">
          <div class="word-meta-field">
            <label for="categorySelect" class="word-meta-label">Categoría</label>
            <div class="cat-field-wrap">
              <select id="categorySelect" class="word-meta-select">
                <option value="" disabled selected>Cargando…</option>
              </select>
              <div id="newCatWrap" class="new-cat-wrap" hidden>
                <input type="text" id="categoryNew" class="word-meta-input new-cat-input"
                       placeholder="Nombre de la nueva categoría…" maxlength="60" autocomplete="off" />
                <button type="button" id="cancelNewCat" class="new-cat-cancel" title="Cancelar">✕</button>
              </div>
            </div>
          </div>

          <div class="word-meta-field">
            <label for="documentUrl" class="word-meta-label">URL documento externo</label>
            <input type="text" id="documentUrl" class="word-meta-input" placeholder="https://…" />
          </div>
        </div>
      </div>

      <div class="word-page-divider"></div>

      <!-- Descripción -->
      <div class="word-page-section">
        <p class="word-section-label">Descripción breve</p>
        <textarea id="description" class="word-description-input" rows="3"
                  placeholder="Resume en pocas líneas de qué trata este procedimiento…"></textarea>
      </div>

      <div class="word-page-divider"></div>

      <!-- Pasos -->
      <div class="word-page-section">
        <div class="steps-label-row">
          <p class="word-section-label">Pasos del procedimiento</p>

          <!-- Botón importar PDF -->
          <label for="pdfInput" class="pdf-import-btn" id="pdfBtnLabel">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            Importar PDF
          </label>
          <input type="file" id="pdfInput" accept="application/pdf" hidden />
        </div>

        <!-- Barra de progreso (oculta hasta que se use) -->
        <div id="pdfProgress" class="pdf-progress" hidden>
          <div class="pdf-progress-bar">
            <div class="pdf-progress-fill" id="pdfProgressFill"></div>
          </div>
          <span id="pdfProgressText" class="pdf-progress-text">Leyendo PDF…</span>
        </div>

        <div id="stepsEditor" class="word-quill-editor"></div>
        <p class="word-editor-hint">
          Escribe directamente, pega texto con formato e imágenes,
          o importa un PDF para extraer su texto automáticamente.
        </p>
      </div>

    </div>
  </main>

  <!-- PDF.js — extracción local, sin APIs externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <script type="module" src="./js/new-procedure.js"></script>
</body>
</html>
